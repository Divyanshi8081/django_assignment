{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="card">
    <div class="card-title">Welcome </div>
    <form method="post" novalidate>
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            <label>{{ field.label }}</label>
            {{ field }}
        </div>
        {% endfor %}
        <button class="btn" type="submit">Login</button>
    </form>
    <div class="alt-link">No account? <a href="/users/register/">Register here</a></div>
</div>
{% endblock %}
